<!-- ROI Card template for GroeiTeam page -->
<style>

}

    gap: 0.8rem;
}

    text-align: center;
}
.roi-item .roi-label {
    font-size: 0.62rem;

    letter-spacing: 0.5px;

}
.roi-item .roi-value {
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.3;
}
.roi-item .roi-trend {
    font-size: 0.68rem;
    margin-top: 0.1rem;
}
.roi-positive { color: #10b981; }
.roi-negative { color: #ef4444; }
.roi-neutral  { color: var(--text-muted); }

    border-left: 1px solid var(--border);
    padding-left: 0.8rem;
}
.roi-spark {
    font-size: 0.68rem;

}

    .roi-grid { grid-template-columns: repeat(2, 1fr); }
